<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirror</title>
    <script src="https://cdn.jsdelivr.net/gh/Destroyed12121/Staticsj@main/JS/scramjet.all.js" defer></script>
    <script type="module">
        import * as BareMux from "https://cdn.jsdelivr.net/npm/@mercuryworkshop/bare-mux/dist/index.mjs";
        window.BareMux = BareMux;
    </script>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #frame-root,
        #frame-root iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }

        #loading {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            color: #fff;
            font-family: Arial, sans-serif;
            background: #000;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div id="loading"></div>
    <div id="frame-root"></div>
    <script>
        const TARGET_URL = "https://accounts.google.com";
        const WISP_URL = "wss://wisp.mercurywork.shop/";
        const SW_CONFIG_RETRY_DELAYS_MS = [500, 1500];

        async function startMirror() {
            const rootPath = new URL("../", window.location.href).pathname;
            const { ScramjetController } = $scramjetLoadController();

            const scramjet = new ScramjetController({
                prefix: rootPath + "scramjet/",
                files: {
                    wasm: "https://cdn.jsdelivr.net/gh/Destroyed12121/Staticsj@main/JS/scramjet.wasm.wasm",
                    all: "https://cdn.jsdelivr.net/gh/Destroyed12121/Staticsj@main/JS/scramjet.all.js",
                    sync: "https://cdn.jsdelivr.net/gh/Destroyed12121/Staticsj@main/JS/scramjet.sync.js"
                }
            });

            await scramjet.init();

            const connection = new BareMux.BareMuxConnection(rootPath + "bareworker.js");
            await connection.setTransport(
                "https://cdn.jsdelivr.net/npm/@mercuryworkshop/epoxy-transport@2.1.28/dist/index.mjs",
                [{ wisp: WISP_URL }]
            );

            if ("serviceWorker" in navigator) {
                const registration = await navigator.serviceWorker.register(rootPath + "sw.js", { scope: rootPath });
                await navigator.serviceWorker.ready;

                const config = {
                    type: "config",
                    wispurl: WISP_URL,
                    servers: [{ name: "Mirror Server", url: WISP_URL }],
                    autoswitch: false
                };

                const sendConfig = () => {
                    if (registration.active) registration.active.postMessage(config);
                };

                sendConfig();
                SW_CONFIG_RETRY_DELAYS_MS.forEach((delay) => setTimeout(sendConfig, delay));
            }

            const frame = scramjet.createFrame();
            frame.frame.addEventListener("load", () => {
                const loading = document.getElementById("loading");
                if (loading) loading.style.display = "none";
            });
            document.getElementById("frame-root").appendChild(frame.frame);
            frame.go(TARGET_URL);
        }

        window.addEventListener("load", startMirror);
    </script>
</body>
</html>
